<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>천명당 관리자 — 불만 접수 현황</title>
<style>
  :root {
    --bg: #0d1020;
    --bg2: #151a30;
    --card: rgba(20, 26, 48, 0.85);
    --border: rgba(255, 255, 255, 0.08);
    --text: #e8ecf5;
    --text2: #9ba3b8;
    --gold: #d4af37;
    --gold2: #f4d06f;
    --jade: #4a9e8e;
    --jade2: #7bc4b5;
    --burgundy: #c75a6e;
    --water: #64b5f6;
    --purple: #a78bfa;
    --orange: #ffb74d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', -apple-system, sans-serif;
    background: radial-gradient(ellipse at top, #1a1f3a 0%, #0d1020 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px 60px;
    line-height: 1.5;
    font-size: 14px;
  }
  .wrap { max-width: 1280px; margin: 0 auto; }

  /* Gate */
  .gate {
    max-width: 420px;
    margin: 80px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 40px 32px;
    text-align: center;
  }
  .gate h1 { font-size: 1.3rem; margin-bottom: 8px; color: var(--gold2); }
  .gate p { color: var(--text2); font-size: 0.85rem; margin-bottom: 24px; }
  .gate input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.9rem;
    margin-bottom: 12px;
    outline: none;
    font-family: inherit;
  }
  .gate input:focus { border-color: var(--gold); }
  .gate button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 6px;
    color: #1a1f3a;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
  }
  .gate .err { color: var(--burgundy); font-size: 0.78rem; margin-top: 8px; min-height: 1em; }

  /* Main */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1 {
    font-size: 1.2rem;
    font-weight: 800;
    background: linear-gradient(90deg, var(--gold2), var(--jade2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header .meta {
    font-size: 0.72rem;
    color: var(--text2);
    font-family: 'Courier New', monospace;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .toolbar button {
    padding: 7px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 0.76rem;
    cursor: pointer;
    font-family: inherit;
  }
  .toolbar button:hover { border-color: var(--gold); color: var(--gold2); }
  .toolbar button.danger:hover { border-color: var(--burgundy); color: var(--burgundy); }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat .num { font-size: 1.4rem; font-weight: 800; color: var(--gold2); }
  .stat .label { font-size: 0.7rem; color: var(--text2); margin-top: 2px; letter-spacing: 0.05em; }
  .stat.refund { border-left-color: #f4d06f; }
  .stat.bug { border-left-color: #e57373; }
  .stat.improvement { border-left-color: var(--jade2); }
  .stat.dissatisfaction { border-left-color: var(--burgundy); }

  /* Filters */
  .filters {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--text2);
    font-size: 0.74rem;
    cursor: pointer;
    font-family: inherit;
  }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #1a1f3a; font-weight: 700; }

  /* Complaint cards */
  .complaint {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--cat-color, var(--gold));
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 12px;
  }
  .complaint .top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .complaint .cat-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 700;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--cat-color, var(--gold));
    color: var(--cat-color, var(--gold));
  }
  .complaint .ts {
    font-size: 0.7rem;
    color: var(--text2);
    font-family: 'Courier New', monospace;
    margin-left: auto;
  }
  .complaint .body {
    background: rgba(0,0,0,0.25);
    padding: 12px 14px;
    border-radius: 6px;
    color: var(--text);
    font-size: 0.86rem;
    white-space: pre-wrap;
    margin: 10px 0;
    line-height: 1.6;
  }
  .complaint .meta-row {
    display: flex;
    gap: 14px;
    font-size: 0.74rem;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .complaint .meta-row strong { color: var(--text); }
  .complaint .scores {
    display: flex;
    gap: 14px;
    margin: 10px 0;
    font-size: 0.74rem;
  }
  .bar {
    display: inline-flex;
    gap: 3px;
    align-items: center;
  }
  .bar span {
    width: 14px;
    height: 5px;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    display: inline-block;
  }
  .bar span.on-sev { background: var(--burgundy); }
  .bar span.on-val { background: var(--jade2); }
  .keywords {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .keywords span {
    font-size: 0.66rem;
    padding: 2px 7px;
    background: rgba(123,196,181,0.08);
    border: 1px solid rgba(123,196,181,0.25);
    border-radius: 99px;
    color: var(--jade2);
  }
  .complaint .actions {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
    flex-wrap: wrap;
  }
  .complaint .actions button {
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    font-size: 0.72rem;
    cursor: pointer;
    font-family: inherit;
  }
  .complaint .actions button:hover { border-color: var(--gold); color: var(--gold2); }
  .complaint .actions button.gh:hover { border-color: #a78bfa; color: #a78bfa; }
  .complaint .actions button.del:hover { border-color: var(--burgundy); color: var(--burgundy); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
    font-size: 0.88rem;
  }

  .note {
    margin-top: 30px;
    padding: 16px 20px;
    background: rgba(255,183,77,0.06);
    border: 1px solid rgba(255,183,77,0.2);
    border-radius: 8px;
    color: var(--text2);
    font-size: 0.78rem;
    line-height: 1.7;
  }
  .note strong { color: var(--orange); }

  @media (max-width: 640px) {
    .complaint .ts { margin-left: 0; width: 100%; }
  }
</style>
</head>
<body>

<!-- Supabase 사용 시 이메일 로그인 게이트, 미사용 시 간단 패스워드 게이트 -->
<div id="gate" class="gate">
  <h1 id="gate-title">🔒 천명당 관리자</h1>

  <!-- Supabase 로그인 영역 -->
  <div id="gate-supabase" style="display:none;">
    <p>Supabase 로그인 이메일과 비밀번호를 입력해주세요<br><span style="font-size:0.72rem;opacity:0.7;">(Dashboard → Authentication → Users 에서 등록한 계정)</span></p>
    <input type="email" id="gate-email" placeholder="이메일 주소" autocomplete="username">
    <input type="password" id="gate-password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')signInWithPassword()">
    <button onclick="signInWithPassword()">로그인</button>
    <div class="err" id="gate-err"></div>
  </div>

  <!-- localStorage 폴백 영역 (Supabase 미설정 시) -->
  <div id="gate-local" style="display:none;">
    <p>Supabase 가 설정되지 않아 로컬 모드로 진입합니다<br><span style="font-size:0.72rem;opacity:0.7;">브라우저 localStorage 데이터만 표시됩니다</span></p>
    <input type="password" id="gate-pw" placeholder="관리자 키" onkeydown="if(event.key==='Enter')tryLocalGate()">
    <button onclick="tryLocalGate()">로컬 모드 입장</button>
    <div class="err" id="gate-err-local"></div>
  </div>
</div>

<!-- 메인 대시보드 -->
<div id="dashboard" class="wrap" style="display:none;">
  <header>
    <div>
      <h1>🛎 천명당 불만 접수 관리자</h1>
      <div class="meta" id="dash-mode-label">—</div>
    </div>
    <div class="toolbar">
      <button onclick="reloadData()">🔄 새로고침</button>
      <button onclick="reanalyzeAll()">🧠 전체 재판독</button>
      <button onclick="exportCsv()">📄 CSV 내보내기</button>
      <button class="danger" onclick="clearAll()">🗑 전체 삭제</button>
      <button id="signout-btn" onclick="signOut()" style="display:none;">🚪 로그아웃</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="filters" id="filters"></div>

  <div id="list"></div>

  <div class="note" id="data-source-note">
    <!-- 데이터 소스 설명은 모드에 따라 JS 에서 주입 -->
  </div>
</div>

<script src="js/complaint-triage.js"></script>
<script src="js/supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ============================================================
  // 모드 결정: Supabase 가 설정되어 있으면 원격 모드, 아니면 로컬 모드
  // ============================================================
  const LOCAL_ADMIN_KEY = '천명당관리자';
  let supabase = null;
  let useSupabase = false;
  let currentUser = null;

  function cfgLooksValid(cfg) {
    return cfg && cfg.enabled && cfg.url && cfg.anonKey
           && cfg.url.indexOf('YOUR_') !== 0
           && cfg.anonKey.indexOf('YOUR_') !== 0;
  }

  // Supabase SDK 로딩 확인 후 클라이언트 생성
  if (window.supabase && cfgLooksValid(window.SUPABASE_CONFIG)) {
    useSupabase = true;
    supabase = window.supabase.createClient(
      window.SUPABASE_CONFIG.url,
      window.SUPABASE_CONFIG.anonKey
    );
  }

  // ============================================================
  // 게이트 UI 스위칭
  // ============================================================
  document.addEventListener('DOMContentLoaded', function () {
    if (useSupabase) {
      document.getElementById('gate-supabase').style.display = 'block';
      // 이미 세션이 있는지 확인
      supabase.auth.getSession().then(({ data }) => {
        if (data.session) {
          currentUser = data.session.user;
          enterDashboard();
        }
      });
      // Auth 상태 변화 구독 (매직 링크 등)
      supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
          currentUser = session.user;
          enterDashboard();
        } else {
          currentUser = null;
        }
      });
    } else {
      document.getElementById('gate-local').style.display = 'block';
    }
  });

  // ============================================================
  // Supabase 로그인
  // ============================================================
  async function signInWithPassword() {
    const email = document.getElementById('gate-email').value.trim();
    const password = document.getElementById('gate-password').value;
    const err = document.getElementById('gate-err');
    err.textContent = '';

    if (!email || !password) {
      err.textContent = '이메일과 비밀번호를 입력해주세요';
      return;
    }

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) {
      err.textContent = '로그인 실패: ' + error.message;
      return;
    }
    currentUser = data.user;
    enterDashboard();
  }

  async function signOut() {
    if (useSupabase && supabase) {
      await supabase.auth.signOut();
    }
    location.reload();
  }

  // ============================================================
  // 로컬 모드 게이트 (Supabase 미설정 시)
  // ============================================================
  function tryLocalGate() {
    const pw = document.getElementById('gate-pw').value;
    const err = document.getElementById('gate-err-local');
    if (pw === LOCAL_ADMIN_KEY || pw === 'admin') {
      enterDashboard();
    } else {
      err.textContent = '관리자 키가 일치하지 않습니다';
    }
  }

  function enterDashboard() {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    const modeLabel = document.getElementById('dash-mode-label');
    const note = document.getElementById('data-source-note');
    const signoutBtn = document.getElementById('signout-btn');

    if (useSupabase) {
      modeLabel.innerHTML = '🟢 Supabase 원격 DB 연결됨' +
        (currentUser ? ' · <code style="font-size:0.7rem;">' + escapeHtml(currentUser.email || '') + '</code>' : '');
      signoutBtn.style.display = 'inline-block';
      note.innerHTML =
        '<strong>🟢 Supabase 원격 모드</strong><br>' +
        '이 대시보드는 실제 Supabase DB 에서 모든 사용자의 접수 데이터를 조회합니다. ' +
        '변경(삭제·재판독)은 DB 에 즉시 반영됩니다.<br><br>' +
        '<strong>🔗 GitHub 이슈 전환</strong> — 각 불만 카드의 "이슈 생성" 버튼을 누르면 원문·분류·점수·키워드가 미리 채워진 GitHub 이슈 작성 페이지가 새 탭으로 열립니다. ' +
        '코드 수정은 <strong>반드시 이슈 검토 후 수동으로</strong> 진행합니다 (프롬프트 인젝션 방지 원칙).';
    } else {
      modeLabel.textContent = '🟡 로컬 모드 · localStorage 에서 조회 (현재 브라우저 전용)';
      signoutBtn.style.display = 'none';
      note.innerHTML =
        '<strong>⚠️ 로컬 모드 안내</strong><br>' +
        'Supabase 가 아직 설정되지 않아 브라우저 <code>localStorage</code> 데이터만 조회합니다. 현재 브라우저에서 제출된 불만만 보입니다.<br><br>' +
        '실제 다중 사용자 접수를 보려면 <code>js/supabase-config.js</code> 에서 프로젝트 URL·anon key 를 입력하고 <code>enabled: true</code> 로 변경한 뒤, <code>supabase/schema.sql</code> 을 Supabase SQL Editor 에서 실행하세요.';
    }

    reloadData();
  }

  // ============================================================
  // 데이터 로드 / 필터
  // ============================================================
  let allComplaints = [];
  let activeFilter = 'all';

  function loadLocal() {
    try {
      return JSON.parse(localStorage.getItem('cheonmyeong_complaints') || '[]');
    } catch (e) {
      return [];
    }
  }

  function saveLocal(list) {
    localStorage.setItem('cheonmyeong_complaints', JSON.stringify(list));
  }

  /** Supabase 행 → UI 표준 형태로 매핑 */
  function mapRemoteRow(r) {
    return {
      id: r.id,
      name: r.name,
      tel: r.tel,
      email: r.email,
      type: r.type,
      detail: r.detail,
      rating: r.rating,
      timestamp: r.submitted_at,
      analysis: r.analysis
    };
  }

  async function reloadData() {
    if (useSupabase) {
      const { data, error } = await supabase
        .from('complaints')
        .select('*')
        .order('submitted_at', { ascending: false });
      if (error) {
        alert('원격 조회 실패: ' + error.message);
        allComplaints = [];
      } else {
        allComplaints = (data || []).map(mapRemoteRow);
      }
    } else {
      allComplaints = loadLocal();
      allComplaints.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
    }
    render();
  }

  async function reanalyzeAll() {
    if (!window.ComplaintTriage) {
      alert('판독 엔진이 로드되지 않았습니다');
      return;
    }
    if (!confirm('모든 불만에 대해 판독 엔진을 재실행합니다. 계속하시겠습니까?')) return;

    // 메모리 상에서 재판독
    allComplaints = allComplaints.map(c => {
      try { c.analysis = window.ComplaintTriage.analyze(c); } catch (e) {}
      return c;
    });

    if (useSupabase) {
      // 각 행에 UPDATE — 개수가 많을 경우 병렬 제한
      let ok = 0, fail = 0;
      for (const c of allComplaints) {
        const { error } = await supabase
          .from('complaints')
          .update({ analysis: c.analysis })
          .eq('id', c.id);
        if (error) fail++; else ok++;
      }
      alert('재판독 완료: 성공 ' + ok + '건, 실패 ' + fail + '건');
    } else {
      saveLocal(allComplaints);
    }
    render();
  }

  async function deleteComplaint(id) {
    if (!confirm('이 불만을 삭제하시겠습니까?')) return;
    if (useSupabase) {
      const { error } = await supabase.from('complaints').delete().eq('id', id);
      if (error) { alert('삭제 실패: ' + error.message); return; }
    }
    allComplaints = allComplaints.filter(c => c.id !== id);
    if (!useSupabase) saveLocal(allComplaints);
    render();
  }

  async function clearAll() {
    if (!confirm('모든 불만 데이터를 삭제합니다. 계속하시겠습니까?')) return;
    if (useSupabase) {
      const ids = allComplaints.map(c => c.id);
      if (ids.length) {
        const { error } = await supabase.from('complaints').delete().in('id', ids);
        if (error) { alert('삭제 실패: ' + error.message); return; }
      }
    } else {
      localStorage.removeItem('cheonmyeong_complaints');
    }
    allComplaints = [];
    render();
  }

  // ============================================================
  // 렌더링
  // ============================================================
  function render() {
    renderStats();
    renderFilters();
    renderList();
  }

  function renderStats() {
    const total = allComplaints.length;
    const counts = { refund: 0, bug: 0, improvement: 0, dissatisfaction: 0, other: 0 };
    let avgSev = 0, avgVal = 0;
    allComplaints.forEach(c => {
      const cat = c.analysis && c.analysis.category ? c.analysis.category.key : 'other';
      counts[cat] = (counts[cat] || 0) + 1;
      if (c.analysis) {
        avgSev += c.analysis.severity || 0;
        avgVal += c.analysis.validityScore || 0;
      }
    });
    if (total > 0) {
      avgSev = (avgSev / total).toFixed(1);
      avgVal = (avgVal / total).toFixed(1);
    }

    const el = document.getElementById('stats');
    el.innerHTML = `
      <div class="stat"><div class="num">${total}</div><div class="label">총 접수</div></div>
      <div class="stat refund"><div class="num">${counts.refund}</div><div class="label">💰 환불/결제</div></div>
      <div class="stat bug"><div class="num">${counts.bug}</div><div class="label">🐛 오류/버그</div></div>
      <div class="stat dissatisfaction"><div class="num">${counts.dissatisfaction}</div><div class="label">😕 불만족</div></div>
      <div class="stat improvement"><div class="num">${counts.improvement}</div><div class="label">💡 개선 제안</div></div>
      <div class="stat"><div class="num">${avgSev || 0}</div><div class="label">평균 심각도</div></div>
      <div class="stat"><div class="num">${avgVal || 0}</div><div class="label">평균 타당성</div></div>
    `;
  }

  function renderFilters() {
    const filters = [
      { key: 'all', label: '전체' },
      { key: 'refund', label: '💰 환불/결제' },
      { key: 'bug', label: '🐛 버그' },
      { key: 'dissatisfaction', label: '😕 불만족' },
      { key: 'improvement', label: '💡 개선' },
      { key: 'other', label: '기타' },
      { key: 'high', label: '🔥 심각도 4+' }
    ];
    document.getElementById('filters').innerHTML = filters.map(f =>
      `<button class="filter-btn ${activeFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label}</button>`
    ).join('');
  }

  window.setFilter = function(key) {
    activeFilter = key;
    render();
  };
  window.reloadData = reloadData;
  window.reanalyzeAll = reanalyzeAll;
  window.clearAll = clearAll;
  window.deleteComplaint = deleteComplaint;
  window.signInWithPassword = signInWithPassword;
  window.signOut = signOut;
  window.tryLocalGate = tryLocalGate;

  function filtered() {
    if (activeFilter === 'all') return allComplaints;
    if (activeFilter === 'high') {
      return allComplaints.filter(c => c.analysis && c.analysis.severity >= 4);
    }
    return allComplaints.filter(c => {
      const cat = c.analysis && c.analysis.category ? c.analysis.category.key : 'other';
      return cat === activeFilter;
    });
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderList() {
    const list = filtered();
    const el = document.getElementById('list');
    if (list.length === 0) {
      el.innerHTML = '<div class="empty">📭 표시할 불만이 없습니다.<br><span style="font-size:0.76rem;">localStorage에 저장된 기록이 없거나 필터에 걸리지 않았습니다.</span></div>';
      return;
    }

    el.innerHTML = list.map(c => {
      const a = c.analysis || {};
      const cat = a.category || { key: 'other', label: '판독 전', icon: '📋', color: '#9ba3b8' };
      const sev = a.severity || 0;
      const val = a.validityScore || 0;

      let sevBar = '';
      for (let i = 1; i <= 5; i++) sevBar += `<span class="${i <= sev ? 'on-sev' : ''}"></span>`;
      let valBar = '';
      for (let i = 1; i <= 5; i++) valBar += `<span class="${i <= val ? 'on-val' : ''}"></span>`;

      const kws = (a.keywords || []).map(k => `<span>#${escapeHtml(k)}</span>`).join('');
      const ts = c.timestamp ? new Date(c.timestamp).toLocaleString('ko-KR') : '';

      const contact = [c.name, c.tel, c.email].filter(Boolean).join(' · ') || '익명';

      return `
        <div class="complaint" style="--cat-color: ${cat.color};">
          <div class="top">
            <span class="cat-chip">${cat.icon} ${escapeHtml(cat.label)}</span>
            <span style="font-size:0.72rem;color:var(--text2);">유형: ${escapeHtml(c.type || '미지정')}</span>
            <span class="ts">${ts}</span>
          </div>
          <div class="meta-row">
            <span><strong>제출자</strong>: ${escapeHtml(contact)}</span>
            <span><strong>별점</strong>: ${'★'.repeat(c.rating || 0)}${'☆'.repeat(5 - (c.rating || 0))}</span>
            <span><strong>ID</strong>: <code style="font-size:0.68rem;">${escapeHtml(c.id || '-')}</code></span>
          </div>
          <div class="body">${escapeHtml(c.detail)}</div>
          <div class="scores">
            <span style="color:var(--text2);">심각도 <span class="bar">${sevBar}</span> ${sev}/5</span>
            <span style="color:var(--text2);">타당성 <span class="bar">${valBar}</span> ${val}/5</span>
          </div>
          ${kws ? `<div class="keywords">${kws}</div>` : ''}
          <div class="actions">
            <button class="gh" onclick="createGithubIssue('${escapeHtml(c.id)}')">🔗 GitHub 이슈 생성</button>
            <button onclick="copyAnalysis('${escapeHtml(c.id)}')">📋 분석 복사</button>
            <button class="del" onclick="deleteComplaint('${escapeHtml(c.id)}')">🗑 삭제</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // ============================================================
  // GitHub 이슈 자동 생성
  // ============================================================
  const GITHUB_REPO = 'ghdejr11-beep/cheonmyeongdang';

  window.createGithubIssue = function(id) {
    const c = allComplaints.find(x => x.id === id);
    if (!c) return;
    const a = c.analysis || {};
    const cat = a.category || {};

    const catToLabel = {
      bug: 'bug',
      refund: 'payment',
      improvement: 'enhancement',
      dissatisfaction: 'feedback',
      other: 'feedback'
    };
    const label = catToLabel[cat.key] || 'feedback';

    const titlePrefix = {
      bug: '[버그] ',
      refund: '[환불] ',
      improvement: '[개선] ',
      dissatisfaction: '[피드백] '
    }[cat.key] || '[불만] ';

    const snippet = (c.detail || '').slice(0, 50).replace(/\n/g, ' ');
    const title = titlePrefix + snippet + (c.detail.length > 50 ? '…' : '');

    const body = [
      '## 원본 불만 내용',
      '',
      '> ' + (c.detail || '').split('\n').join('\n> '),
      '',
      '## 자동 판독 결과',
      '',
      '| 항목 | 값 |',
      '|---|---|',
      '| 카테고리 | ' + (cat.icon || '') + ' ' + (cat.label || '미분류') + ' |',
      '| 심각도 | ' + (a.severity || 0) + ' / 5 |',
      '| 타당성 | ' + (a.validityScore || 0) + ' / 5 |',
      '| 키워드 | ' + ((a.keywords || []).join(', ') || '없음') + ' |',
      '| 접수 유형 | ' + (c.type || '미지정') + ' |',
      '| 별점 | ' + (c.rating || 0) + '점 |',
      '| 제출 시각 | ' + (c.timestamp || '-') + ' |',
      '| 접수 ID | `' + (c.id || '-') + '` |',
      '',
      '## 제출자 연락처',
      '',
      '- 이름: ' + (c.name || '익명'),
      '- 연락처: ' + (c.tel || '-'),
      '- 이메일: ' + (c.email || '-'),
      '',
      '---',
      '_이 이슈는 천명당 관리자 대시보드에서 자동 생성되었습니다._'
    ].join('\n');

    const url = `https://github.com/${GITHUB_REPO}/issues/new?title=${encodeURIComponent(title)}&body=${encodeURIComponent(body)}&labels=${encodeURIComponent(label)}`;
    window.open(url, '_blank');
  };

  // ============================================================
  // 분석 복사 / CSV 내보내기
  // ============================================================
  window.copyAnalysis = function(id) {
    const c = allComplaints.find(x => x.id === id);
    if (!c) return;
    const json = JSON.stringify(c, null, 2);
    navigator.clipboard.writeText(json).then(() => {
      alert('분석 결과가 클립보드에 복사되었습니다');
    }).catch(() => {
      prompt('아래 내용을 복사하세요:', json);
    });
  };

  window.exportCsv = function() {
    if (allComplaints.length === 0) { alert('내보낼 데이터가 없습니다'); return; }
    const headers = ['ID', '접수시각', '이름', '연락처', '이메일', '유형', '카테고리', '심각도', '타당성', '별점', '키워드', '내용'];
    const rows = allComplaints.map(c => {
      const a = c.analysis || {};
      const cat = a.category || {};
      return [
        c.id || '',
        c.timestamp || '',
        c.name || '',
        c.tel || '',
        c.email || '',
        c.type || '',
        cat.label || '',
        a.severity || '',
        a.validityScore || '',
        c.rating || '',
        (a.keywords || []).join(';'),
        (c.detail || '').replace(/\n/g, ' ')
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
    });
    const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `complaints_${new Date().toISOString().slice(0,10)}.csv`;
    link.click();
    URL.revokeObjectURL(url);
  };
</script>
</body>
</html>
