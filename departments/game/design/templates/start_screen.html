<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{{GAME_NAME}}</title>
<style>
  /* === KunStudio Game Start Screen Template ===
   * 사용법: {{변수}} 부분만 게임별로 교체
   * 변수: GAME_NAME, MAIN_COLOR, ACCENT_COLOR, DARK_COLOR, MASCOT_EMOJI(optional), TAGLINE
   */
  :root {
    --main: {{MAIN_COLOR}};      /* 예: #FF9864 */
    --accent: {{ACCENT_COLOR}};  /* 예: #FFD86F */
    --dark: {{DARK_COLOR}};      /* 예: #3D2914 */
    --white: #FAFAFA;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100vh; overflow: hidden;
    font-family: 'Noto Sans KR', 'Inter', system-ui, sans-serif;
    background: linear-gradient(180deg, var(--main) 0%, var(--dark) 100%);
    color: var(--white);
  }
  .container {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 8vh 5vw 6vh; user-select: none;
  }
  /* 상단 60% — 타이틀 + 마스코트 */
  .top {
    flex: 0 0 60%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px;
  }
  .title {
    font-size: clamp(2.5rem, 12vw, 5rem); font-weight: 900;
    text-align: center; letter-spacing: -0.02em;
    text-shadow: 0 4px 12px rgba(0,0,0,0.3);
  }
  .tagline {
    font-size: clamp(0.9rem, 3.5vw, 1.2rem);
    opacity: 0.85; text-align: center; max-width: 80%;
  }
  .mascot {
    font-size: clamp(4rem, 20vw, 8rem);
    animation: bounce 2.4s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
  /* 중앙 24% — Play 버튼 */
  .play-area {
    flex: 0 0 24%; display: flex; align-items: center;
  }
  .btn-play {
    background: var(--accent); color: var(--dark);
    border: none; border-radius: 50px;
    padding: 18px 64px;
    font-size: 1.3rem; font-weight: 800;
    cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    transition: all 0.15s;
  }
  .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
  /* 하단 16% — 옵션 아이콘 */
  .bottom {
    flex: 0 0 16%; display: flex; gap: 24px;
    align-items: center; justify-content: center;
  }
  .icon-btn {
    background: rgba(255,255,255,0.15);
    border: none; border-radius: 50%;
    width: 56px; height: 56px;
    display: grid; place-items: center;
    color: var(--white); cursor: pointer;
  }
  /* 우측 상단 사운드 토글 */
  .sound-toggle {
    position: fixed; top: 20px; right: 20px;
    background: rgba(0,0,0,0.3); border: none;
    border-radius: 50%; width: 40px; height: 40px;
    color: var(--white); cursor: pointer;
  }
</style>
</head>
<body>
  <button class="sound-toggle" aria-label="사운드 토글" onclick="toggleSound()">🔊</button>
  <div class="container">
    <div class="top">
      <div class="mascot">{{MASCOT_EMOJI}}</div>
      <h1 class="title">{{GAME_NAME}}</h1>
      <p class="tagline">{{TAGLINE}}</p>
    </div>
    <div class="play-area">
      <button class="btn-play" onclick="startGame()">PLAY</button>
    </div>
    <div class="bottom">
      <button class="icon-btn" aria-label="설정">⚙</button>
      <button class="icon-btn" aria-label="순위">🏆</button>
      <button class="icon-btn" aria-label="도움말">?</button>
    </div>
  </div>
  <script>
    let soundOn = true;
    function toggleSound() {
      soundOn = !soundOn;
      document.querySelector('.sound-toggle').textContent = soundOn ? '🔊' : '🔇';
    }
    function startGame() {
      // 게임별로 교체
      console.log('Game started');
    }
  </script>
</body>
</html>
