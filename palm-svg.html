<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>손금 안내도 - 천명당</title>
<style>
  body {
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    font-family: 'Malgun Gothic', sans-serif;
  }
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 550" width="400" height="550">
  <defs>
    <!-- Skin gradient for 3D effect -->
    <radialGradient id="skinGrad" cx="50%" cy="45%" r="55%" fx="45%" fy="40%">
      <stop offset="0%" stop-color="#FADED0"/>
      <stop offset="40%" stop-color="#F5D6B8"/>
      <stop offset="75%" stop-color="#E8C4A0"/>
      <stop offset="100%" stop-color="#D4A87C"/>
    </radialGradient>
    <!-- Shadow gradient for depth -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)" />
      <stop offset="85%" stop-color="rgba(0,0,0,0.03)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.12)" />
    </radialGradient>
    <!-- Finger pad highlight -->
    <radialGradient id="padGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(255,220,200,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,220,200,0)"/>
    </radialGradient>
    <!-- Thumb mount gradient -->
    <radialGradient id="thumbMount" cx="40%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(240,180,160,0.3)"/>
      <stop offset="100%" stop-color="rgba(240,180,160,0)"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="palmShadow" x="-10%" y="-5%" width="120%" height="115%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
    <!-- Soft glow for lines -->
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ========== PALM OUTLINE ========== -->
  <g filter="url(#palmShadow)">
    <!-- Main palm shape with fingers - left hand, palm side -->
    <path id="palmOutline" d="
      M 175,525
      C 155,520 110,505 90,475
      C 70,445 58,410 55,375
      C 50,340 48,310 50,280
      C 52,255 55,240 55,225
      C 55,210 52,195 50,180
      C 48,170 46,155 48,140
      C 50,125 55,115 62,108

      C 100,112 102,118 103,128

      C 170,148 174,125 177,105

      C 219,138 218,150 217,160

      C 222,145 226,122 229,102
      C 232,82 234,65 236,52
      C 238,40 240,32 243,27
      C 246,22 250,20 254,21
      C 258,22 262,26 265,33
      C 268,40 269,50 270,64
      C 271,78 271,95 270,112
      C 269,128 268,142 266,155
      C 265,165 264,172 262,178

      C 268,168 274,152 280,140
      C 286,128 290,120 294,115
      C 298,110 302,108 306,110
      C 310,112 314,118 316,127
      C 318,136 319,148 318,162
      C 317,175 314,190 310,205
      C 306,218 302,228 297,238

      C 310,235 320,240 328,248
      C 335,256 340,266 342,278
      C 344,290 343,305 340,322
      C 337,340 330,360 320,380
      C 310,400 298,420 282,442
      C 268,462 252,478 235,492
      C 218,506 200,516 185,522
      C 180,524 177,525 175,525
      Z
    " fill="url(#skinGrad)" stroke="#C9956B" stroke-width="1.5"/>

    <!-- Overall shadow overlay -->
    <path d="
      M 175,525
      C 155,520 110,505 90,475
      C 70,445 58,410 55,375
      C 50,340 48,310 50,280
      C 52,255 55,240 55,225
      C 55,210 52,195 50,180
      C 48,170 46,155 48,140
      C 50,125 55,115 62,108
      C 68,102 75,100 82,100
      C 88,100 93,103 97,108
      C 100,112 102,118 103,128

      C 105,162 105,168 104,175
      C 108,165 112,148 115,130

      C 180,85 182,65 184,48
      C 186,32 187,20 189,12
      C 191,5 194,2 198,1
      C 202,0 207,1 211,5
      C 215,9 217,16 219,28
      C 221,40 222,56 222,75
      C 222,90 221,108 220,125
      C 219,138 218,150 217,160
      C 222,145 226,122 229,102
      C 232,82 234,65 236,52
      C 238,40 240,32 243,27
      C 246,22 250,20 254,21
      C 258,22 262,26 265,33
      C 268,40 269,50 270,64
      C 271,78 271,95 270,112
      C 269,128 268,142 266,155
      C 265,165 264,172 262,178
      C 268,168 274,152 280,140
      C 286,128 290,120 294,115
      C 298,110 302,108 306,110
      C 310,112 314,118 316,127
      C 318,136 319,148 318,162
      C 317,175 314,190 310,205
      C 306,218 302,228 297,238
      C 310,235 320,240 328,248
      C 335,256 340,266 342,278
      C 344,290 343,305 340,322
      C 337,340 330,360 320,380

      C 268,462 252,478 235,492
      C 218,506 200,516 185,522
      C 180,524 177,525 175,525
      Z
    " fill="url(#shadowGrad)" opacity="0.5"/>
  </g>

  <!-- ========== FINGER JOINT CREASES ========== -->
  <g stroke="#C9956B" stroke-width="0.8" fill="none" opacity="0.5">
    <!-- Thumb joints -->
    <path d="M 62,145 C 72,142 88,140 100,143"/>
    <path d="M 70,125 C 78,123 88,122 95,124"/>

    <!-- Index finger joints -->
    <path d="M 120,100 C 130,96 148,94 160,97"/>
    <path d="M 122,72 C 132,68 148,66 158,70"/>
    <path d="M 125,45 C 133,42 148,40 157,44"/>

    <!-- Middle finger joints -->
    <path d="M 178,82 C 186,78 202,76 214,80"/>
    <path d="M 180,55 C 188,51 202,50 212,54"/>
    <path d="M 183,30 C 190,27 200,26 210,29"/>

    <!-- Ring finger joints -->
    <path d="M 230,88 C 238,84 252,83 262,86"/>
    <path d="M 232,65 C 240,62 252,61 261,64"/>
    <path d="M 234,45 C 241,42 252,42 260,44"/>

    <!-- Pinky joints -->
    <path d="M 278,128 C 286,124 298,122 308,126"/>
    <path d="M 282,112 C 290,108 298,108 306,112"/>
  </g>

  <!-- ========== FINGER PAD HIGHLIGHTS ========== -->
  <g opacity="0.25">
    <ellipse cx="140" cy="18" rx="10" ry="8" fill="url(#padGlow)"/>
    <ellipse cx="197" cy="8" rx="10" ry="7" fill="url(#padGlow)"/>
    <ellipse cx="250" cy="30" rx="10" ry="7" fill="url(#padGlow)"/>
    <ellipse cx="302" cy="115" rx="7" ry="6" fill="url(#padGlow)"/>
    <ellipse cx="82" cy="105" rx="8" ry="6" fill="url(#padGlow)"/>
  </g>

  <!-- ========== THUMB MOUNT (Venus mount shading) ========== -->
  <ellipse cx="105" cy="330" rx="55" ry="90" fill="url(#thumbMount)" opacity="0.6"/>

  <!-- ========== SUBTLE PALM CREASES ========== -->
  <g stroke="#C9956B" stroke-width="0.5" fill="none" opacity="0.3">
    <!-- Wrist creases -->
    <path d="M 100,490 C 140,485 190,484 250,492"/>
    <path d="M 95,500 C 140,496 195,495 255,500"/>
    <path d="M 90,510 C 140,506 200,505 260,510"/>

    <!-- Minor palm creases -->
    <path d="M 120,350 C 135,345 155,342 170,345"/>
    <path d="M 130,370 C 150,365 175,363 195,368"/>
    <path d="M 220,310 C 240,305 260,305 280,312"/>
    <path d="M 230,330 C 248,325 268,325 285,332"/>
    <path d="M 140,420 C 160,415 185,412 210,418"/>
    <path d="M 80,280 C 90,272 100,268 110,270"/>
  </g>

  <!-- ========== MAJOR PALM LINES ========== -->

  <!-- 생명선 (Life Line) - curves around thumb base -->
  <path d="
    M 115,185
    C 110,200 100,225 92,255
    C 84,285 78,320 78,355
    C 78,390 82,420 90,450
    C 95,465 100,475 108,485
  " stroke="#E05555" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#lineGlow)" opacity="0.85"/>

  <!-- 두뇌선 (Head Line) - horizontal across middle -->
  <path d="
    M 115,245
    C 135,238 160,232 185,230
    C 210,228 240,230 265,238
    C 280,243 290,250 298,258
  " stroke="#4488CC" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#lineGlow)" opacity="0.85"/>

  <!-- 감정선 (Heart Line) - curves across upper palm -->
  <path d="
    M 120,195
    C 140,188 165,182 190,180
    C 215,178 240,180 260,185
    C 278,190 290,198 300,208
  " stroke="#E87DA0" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#lineGlow)" opacity="0.85"/>

  <!-- 운명선 (Fate Line) - vertical up the center -->
  <path d="
    M 190,480
    C 188,450 186,410 185,380
    C 184,350 183,320 183,290
    C 183,260 184,240 185,220
    C 186,205 187,195 188,185
  " stroke="#9966CC" stroke-width="2.2" fill="none" stroke-linecap="round" filter="url(#lineGlow)" opacity="0.8" stroke-dasharray="none"/>

  <!-- ========== LINE LABELS ========== -->
  <g font-family="'Malgun Gothic', sans-serif" font-size="11" font-weight="bold">
    <!-- Life Line label -->
    <text x="42" y="355" fill="#E05555" text-anchor="end">
      <tspan x="68" dy="0">생명선</tspan>
    </text>
    <line x1="72" y1="350" x2="80" y2="350" stroke="#E05555" stroke-width="1"/>

    <!-- Head Line label -->
    <text x="305" y="258" fill="#4488CC">
      <tspan>두뇌선</tspan>
    </text>
    <line x1="298" y1="255" x2="303" y2="255" stroke="#4488CC" stroke-width="1"/>

    <!-- Heart Line label -->
    <text x="308" y="205" fill="#E87DA0">
      <tspan>감정선</tspan>
    </text>
    <line x1="300" y1="205" x2="306" y2="205" stroke="#E87DA0" stroke-width="1"/>

    <!-- Fate Line label -->
    <text x="198" y="440" fill="#9966CC">
      <tspan>운명선</tspan>
    </text>
    <line x1="190" y1="435" x2="196" y2="435" stroke="#9966CC" stroke-width="1"/>
  </g>

  <!-- ========== MOUNTS (구) WITH DOTTED CIRCLES ========== -->
  <g fill="none" stroke-width="1.2" stroke-dasharray="3,3" opacity="0.6">
    <!-- 목성구 (Jupiter) - below index finger -->
    <circle cx="145" cy="195" r="22" stroke="#8B6914"/>
    <!-- 토성구 (Saturn) - below middle finger -->
    <circle cx="195" cy="188" r="22" stroke="#8B6914"/>
    <!-- 태양구 (Sun/Apollo) - below ring finger -->
    <circle cx="245" cy="192" r="22" stroke="#8B6914"/>
    <!-- 수성구 (Mercury) - below pinky -->
    <circle cx="290" cy="215" r="18" stroke="#8B6914"/>
    <!-- 금성구 (Venus) - thumb mount area -->
    <circle cx="105" cy="330" r="40" stroke="#8B6914"/>
    <!-- 월구 (Moon) - outer edge lower palm -->
    <circle cx="285" cy="380" r="35" stroke="#8B6914"/>
    <!-- 화성구 (Mars) - center of palm -->
    <circle cx="195" cy="300" r="28" stroke="#8B6914"/>
  </g>

  <!-- ========== MOUNT LABELS ========== -->
  <g font-family="'Malgun Gothic', sans-serif" font-size="9" fill="#6B4E14" text-anchor="middle" opacity="0.8">
    <text x="145" y="192">목성구</text>
    <text x="145" y="202" font-size="7" fill="#8B6914">(Jupiter)</text>

    <text x="195" y="185">토성구</text>
    <text x="195" y="195" font-size="7" fill="#8B6914">(Saturn)</text>

    <text x="245" y="189">태양구</text>
    <text x="245" y="199" font-size="7" fill="#8B6914">(Apollo)</text>

    <text x="290" y="213">수성구</text>
    <text x="290" y="222" font-size="7" fill="#8B6914">(Mercury)</text>

    <text x="105" y="328">금성구</text>
    <text x="105" y="338" font-size="7" fill="#8B6914">(Venus)</text>

    <text x="285" y="378">월구</text>
    <text x="285" y="388" font-size="7" fill="#8B6914">(Moon)</text>

    <text x="195" y="298">화성구</text>
    <text x="195" y="308" font-size="7" fill="#8B6914">(Mars)</text>
  </g>

  <!-- ========== LEGEND ========== -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="120" height="95" rx="6" fill="white" fill-opacity="0.85" stroke="#ddd" stroke-width="0.5"/>
    <text x="10" y="18" font-family="'Malgun Gothic', sans-serif" font-size="10" font-weight="bold" fill="#333">손금 안내도</text>
    <line x1="10" y1="22" x2="110" y2="22" stroke="#ddd" stroke-width="0.5"/>

    <line x1="10" y1="35" x2="30" y2="35" stroke="#E05555" stroke-width="2.5" stroke-linecap="round"/>
    <text x="35" y="38" font-family="'Malgun Gothic', sans-serif" font-size="9" fill="#555">생명선 (Life)</text>

    <line x1="10" y1="50" x2="30" y2="50" stroke="#E87DA0" stroke-width="2.5" stroke-linecap="round"/>
    <text x="35" y="53" font-family="'Malgun Gothic', sans-serif" font-size="9" fill="#555">감정선 (Heart)</text>

    <line x1="10" y1="65" x2="30" y2="65" stroke="#4488CC" stroke-width="2.5" stroke-linecap="round"/>
    <text x="35" y="68" font-family="'Malgun Gothic', sans-serif" font-size="9" fill="#555">두뇌선 (Head)</text>

    <line x1="10" y1="80" x2="30" y2="80" stroke="#9966CC" stroke-width="2.2" stroke-linecap="round"/>
    <text x="35" y="83" font-family="'Malgun Gothic', sans-serif" font-size="9" fill="#555">운명선 (Fate)</text>
  </g>

</svg>

</body>
</html>
