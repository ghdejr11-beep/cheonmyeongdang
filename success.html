<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 - 천명당</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a10;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --jade: #4a9e8e;
    --text: #e8e0d0;
    --text2: #a89880;
    --border: rgba(201,168,76,0.2);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: radial-gradient(ellipse at top, #1a1040 0%, var(--bg) 70%);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    max-width: 520px;
    width: 100%;
    background: linear-gradient(135deg, rgba(13,16,32,0.97), rgba(20,20,40,0.97));
    border: 1px solid var(--gold);
    border-radius: 20px;
    padding: 48px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.6s ease forwards;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .icon {
    font-size: 5rem;
    margin-bottom: 20px;
    animation: pop 0.6s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  h1 {
    font-family: 'Gowun Batang', serif;
    color: var(--gold2);
    font-size: 1.8rem;
    margin-bottom: 16px;
  }
  p {
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.8;
    margin-bottom: 24px;
  }
  .receipt {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin: 24px 0;
    text-align: left;
    font-size: 0.85rem;
  }
  .receipt-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .receipt-row:last-child { border-bottom: none; }
  .receipt-row span:first-child { color: var(--text2); }
  .receipt-row span:last-child { color: var(--gold2); font-weight: 600; }
  .btn {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #080a10;
    font-weight: 700;
    text-decoration: none;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: transform 0.2s;
  }
  .btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>결제가 완료되었습니다</h1>
  <p>
    소중한 주문 감사드립니다.<br>
    전문 역술인이 정성껏 분석하여<br>
    <strong style="color:var(--gold2);">24시간 이내</strong>에 이메일로 발송해 드립니다.
  </p>
  <div class="receipt" id="receipt">
    <!-- 영수증 정보 -->
  </div>
  <a href="./" class="btn">🏠 천명당으로 돌아가기</a>
</div>

<script>
  // URL 파라미터에서 결제 정보 추출
  var params = new URLSearchParams(window.location.search);
  var paymentKey = params.get('paymentKey');
  var orderId = params.get('orderId');
  var amount = params.get('amount');

  // localStorage에서 주문 정보 로드
  var orderData = JSON.parse(localStorage.getItem('cm_current_order') || '{}');

  // 영수증 표시
  var receipt = document.getElementById('receipt');
  receipt.innerHTML =
    '<div class="receipt-row"><span>주문번호</span><span>' + (orderId || orderData.orderId || '-') + '</span></div>' +
    '<div class="receipt-row"><span>서비스</span><span>' + (orderData.serviceName || '-') + '</span></div>' +
    '<div class="receipt-row"><span>결제 금액</span><span>' + (amount ? parseInt(amount).toLocaleString() : (orderData.price ? orderData.price.toLocaleString() : '0')) + '원</span></div>' +
    '<div class="receipt-row"><span>결제일</span><span>' + new Date().toLocaleString('ko-KR') + '</span></div>' +
    '<div class="receipt-row"><span>발송 이메일</span><span>' + (orderData.email || '-') + '</span></div>';

  // 주문 상태 업데이트
  if (orderData.orderId) {
    orderData.status = 'completed';
    orderData.paidAt = new Date().toISOString();
    if (paymentKey) orderData.paymentKey = paymentKey;
    var orders = JSON.parse(localStorage.getItem('cm_orders') || '[]');
    var idx = orders.findIndex(function(o) { return o.orderId === orderData.orderId; });
    if (idx >= 0) orders[idx] = orderData;
    localStorage.setItem('cm_orders', JSON.stringify(orders));
  }
</script>
</body>
</html>
