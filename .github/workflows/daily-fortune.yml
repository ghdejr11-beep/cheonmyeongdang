name: 매일 자동 운세 콘텐츠 생성

on:
  schedule:
    # 매일 한국시간 오전 6시 (UTC 21:00 전날)
    - cron: '0 21 * * *'
  workflow_dispatch:
    # 수동 실행 가능

jobs:
  generate-daily-fortune:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate today's fortune content
        run: |
          mkdir -p daily
          node << 'EOF'
          const fs = require('fs');
          const today = new Date();
          const KST = new Date(today.getTime() + 9 * 60 * 60 * 1000);
          const yyyy = KST.getUTCFullYear();
          const mm = String(KST.getUTCMonth() + 1).padStart(2, '0');
          const dd = String(KST.getUTCDate()).padStart(2, '0');
          const dateStr = `${yyyy}-${mm}-${dd}`;
          const dateKr = `${yyyy}년 ${parseInt(mm)}월 ${parseInt(dd)}일`;

          const cheongan = ['갑','을','병','정','무','기','경','신','임','계'];
          const jiji = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
          const ddi = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
          const yearStem = cheongan[(yyyy - 4) % 10];
          const yearBranch = jiji[(yyyy - 4) % 12];
          const yearDdi = ddi[(yyyy - 4) % 12];

          const dayNum = Math.floor((Date.UTC(yyyy, parseInt(mm)-1, parseInt(dd)) - Date.UTC(2000, 0, 7)) / 86400000);
          const dayStem = cheongan[((dayNum % 10) + 10) % 10];
          const dayBranch = jiji[((dayNum % 12) + 12) % 12];

          const elements = ['목','화','토','금','수'];
          const directions = ['동','서','남','북','동남','서북','동북','서남'];
          const colors = ['빨강','파랑','노랑','초록','보라','주황','분홍','금색','은색','흰색'];

          const seed = dayNum;
          const r = (n) => Math.abs(Math.sin(seed * n) * 10000) % 1;

          const luckyColor = colors[Math.floor(r(1) * colors.length)];
          const luckyDirection = directions[Math.floor(r(2) * directions.length)];
          const luckyNumber = Math.floor(r(3) * 9) + 1;
          const luckyElement = elements[Math.floor(r(4) * elements.length)];

          const ddiList = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
          const ddiFortunes = {};
          ddiList.forEach((d, i) => {
            const dr = (n) => Math.abs(Math.sin((seed + i * 100) * n) * 10000) % 1;
            ddiFortunes[d] = {
              total: Math.floor(dr(1) * 5) + 1,
              wealth: Math.floor(dr(2) * 5) + 1,
              love: Math.floor(dr(3) * 5) + 1,
              health: Math.floor(dr(4) * 5) + 1,
              advice: ['신중하게 행동하세요','새로운 도전이 좋습니다','휴식이 필요한 날입니다','인간관계에 집중하세요','금전 관리를 신경쓰세요'][Math.floor(dr(5) * 5)]
            };
          });

          const html = `<!DOCTYPE html>
          <html lang="ko">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>${dateKr} 오늘의 운세 - 12띠별 운세 - 천명당</title>
          <meta name="description" content="${dateKr} 오늘의 운세를 12띠별로 확인하세요. 행운의 색상은 ${luckyColor}, 행운의 방향은 ${luckyDirection}쪽입니다.">
          <meta name="keywords" content="${dateKr} 운세, 오늘의 운세, ${yyyy}년 ${parseInt(mm)}월 ${parseInt(dd)}일 운세, 12띠별 운세, ${yearDdi}띠 운세">
          <link rel="canonical" href="https://ghdejr11-beep.github.io/cheonmyeongdang/daily/${dateStr}.html">
          <meta property="og:title" content="${dateKr} 오늘의 운세">
          <meta property="og:description" content="12띠별 ${dateKr} 운세를 확인하세요">
          <meta property="og:type" content="article">
          <style>
          body{background:#080a10;color:#e8e0d0;font-family:'Noto Sans KR',sans-serif;max-width:800px;margin:0 auto;padding:20px;}
          h1{color:#e8c97a;text-align:center;font-family:'Noto Serif KR',serif;}
          .date{text-align:center;color:#a89880;margin-bottom:30px;}
          .lucky{background:rgba(201,168,76,0.1);border:1px solid #c9a84c;border-radius:12px;padding:20px;margin-bottom:30px;text-align:center;}
          .lucky-item{display:inline-block;margin:10px 20px;}
          .ddi-card{background:#12152a;border:1px solid #c9a84c33;border-radius:10px;padding:16px;margin-bottom:14px;}
          .ddi-name{color:#e8c97a;font-weight:700;font-size:1.2rem;margin-bottom:8px;}
          .stars{color:#ffd54f;letter-spacing:2px;}
          .back{display:inline-block;margin-top:30px;padding:12px 28px;background:linear-gradient(135deg,#c9a84c,#e8c97a);color:#080a10;text-decoration:none;font-weight:700;border-radius:8px;}
          </style>
          </head>
          <body>
          <h1>${dateKr} 오늘의 운세</h1>
          <p class="date">${yearDdi}띠 ${yearStem}${yearBranch}년 · ${dayStem}${dayBranch}일</p>

          <div class="lucky">
            <h2 style="color:#e8c97a;margin-bottom:14px;">🍀 오늘의 행운</h2>
            <div class="lucky-item">🎨 <strong>${luckyColor}</strong></div>
            <div class="lucky-item">🧭 <strong>${luckyDirection}쪽</strong></div>
            <div class="lucky-item">🔢 <strong>${luckyNumber}</strong></div>
            <div class="lucky-item">${luckyElement === '목' ? '🌿' : luckyElement === '화' ? '🔥' : luckyElement === '토' ? '🌍' : luckyElement === '금' ? '⚪' : '💧'} <strong>${luckyElement}(${{'목':'木','화':'火','토':'土','금':'金','수':'水'}[luckyElement]})</strong></div>
          </div>

          <h2 style="color:#e8c97a;text-align:center;margin:30px 0 20px;">12띠별 운세</h2>
          ${ddiList.map(d => {
            const f = ddiFortunes[d];
            const stars = (n) => '★'.repeat(n) + '☆'.repeat(5-n);
            return `<div class="ddi-card">
              <div class="ddi-name">${d}띠</div>
              <div>종합운: <span class="stars">${stars(f.total)}</span></div>
              <div>재물운: <span class="stars">${stars(f.wealth)}</span> &nbsp; 연애운: <span class="stars">${stars(f.love)}</span> &nbsp; 건강운: <span class="stars">${stars(f.health)}</span></div>
              <div style="color:#a89880;margin-top:6px;">💡 ${f.advice}</div>
            </div>`;
          }).join('')}

          <div style="text-align:center;">
            <a href="https://ghdejr11-beep.github.io/cheonmyeongdang/" class="back">🔮 천명당에서 더 자세한 운세 보기</a>
          </div>
          </body>
          </html>`;

          fs.writeFileSync(`daily/${dateStr}.html`, html);
          console.log('Generated:', dateStr);
          EOF

      - name: Update sitemap
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          if (!fs.existsSync('daily')) return;
          const files = fs.readdirSync('daily').filter(f => f.endsWith('.html')).sort().reverse();
          let urls = '';
          files.slice(0, 30).forEach(f => {
            const date = f.replace('.html','');
            urls += `  <url>\n    <loc>https://ghdejr11-beep.github.io/cheonmyeongdang/daily/${f}</loc>\n    <lastmod>${date}</lastmod>\n    <changefreq>monthly</changefreq>\n    <priority>0.6</priority>\n  </url>\n`;
          });
          let sitemap = fs.readFileSync('sitemap.xml','utf8');
          sitemap = sitemap.replace(/<\/urlset>/, urls + '</urlset>');
          fs.writeFileSync('sitemap.xml', sitemap);
          EOF

      - name: Commit and push
        run: |
          git config user.name "Cheonmyeongdang Bot"
          git config user.email "bot@cheonmyeongdang.com"
          git add daily/ sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 자동 생성: 오늘의 운세 $(date +%Y-%m-%d)" && git push)
