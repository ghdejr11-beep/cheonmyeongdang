name: 📊 분석부 (Analytics Team)

on:
  # 매일 23:00 KST = 14:00 UTC
  schedule:
    - cron: "0 14 * * *"
  # 수동 트리거 (GitHub UI 에서 Run workflow 버튼)
  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유 (선택)"
        required: false
        default: "manual test"

# 동시 실행 방지 — 같은 시간에 여러 번 트리거 돼도 1개만
concurrency:
  group: analytics-team
  cancel-in-progress: false

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 50  # git log --since=24h 가 동작하게 충분히

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: 🤖 Run analytics team
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/teams/analytics_team.py
