name: 📊 분석부 (Analytics Team)

on:
  # 매일 23:00 KST = 14:00 UTC
  schedule:
    - cron: "0 14 * * *"
  # 수동 트리거 (main 브랜치에만 보임 — GitHub UI 제약)
  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유 (선택)"
        required: false
        default: "manual test"
  # push 트리거 — 분석부 코드가 변경될 때마다 자동 실행
  # (workflow_dispatch 가 main 브랜치에서만 동작해서 feature 브랜치에서
  # 테스트하려면 push 트리거가 필요함)
  push:
    branches:
      - "claude/**"
      - "main"
    paths:
      - ".github/workflows/analytics_team.yml"
      - "scripts/teams/analytics_team.py"
      - "scripts/lib/telegram_notify.py"

# 동시 실행 방지 — 같은 시간에 여러 번 트리거 돼도 1개만
concurrency:
  group: analytics-team
  cancel-in-progress: false

jobs:
  run-analytics:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 50  # git log --since=24h 가 동작하게 충분히

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: 🤖 Run analytics team
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/teams/analytics_team.py
