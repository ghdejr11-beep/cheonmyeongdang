name: 🛠️ 개발부 (Dev Team)

on:
  # 매일 06:00 KST = 21:00 UTC (전날)
  schedule:
    - cron: "0 21 * * *"
  # 수동 트리거 (default branch 에 파일 있을 때만 UI 보임)
  workflow_dispatch:
    inputs:
      reason:
        description: "수동 실행 사유"
        required: false
        default: "manual test"
  # push 트리거 — 코드 또는 워크플로우가 변경될 때 자동 실행
  push:
    branches:
      - "claude/**"
      - "main"
    paths:
      - ".github/workflows/dev_team.yml"
      - "scripts/teams/dev_team.py"
      - "scripts/lib/telegram_notify.py"
      - "ebook_system/projects/saju_ai_saas/**"
      - "lyrics_watcher.py"
      - "auto_watcher.py"
      - "youtube_uploader.py"
      - "playlist_maker.py"

concurrency:
  group: dev-team
  cancel-in-progress: false

jobs:
  run-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 50  # git log --since=24h 가 작동하게

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic

      - name: 🛠️ Run dev team
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/teams/dev_team.py
