# Render.com 원클릭 배포 설정
# 사용법:
#   1. GitHub 저장소를 Render 에 연결
#   2. 대시보드에서 ANTHROPIC_API_KEY, GUMROAD_PRODUCT_ID 환경변수 수동 입력
#   3. 자동 배포 완료 → https://your-service.onrender.com

services:
  - type: web
    name: ai-mentor-bot
    runtime: python
    plan: free  # 무료 플랜 (15분 idle 후 sleep, 첫 요청 30초 지연)
    rootDir: ebook_system/mentor_bot
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false  # 대시보드에서 수동 입력 (보안)
      - key: MENTOR_MODE
        value: shared  # shared (기본) 또는 license
      - key: MENTOR_SHARED_SECRET
        generateValue: true  # Render 가 자동 생성 (shared 모드용)
      - key: GUMROAD_PRODUCT_ID
        sync: false  # 대시보드에서 수동 입력 (license 모드용)
      - key: SESSION_SECRET
        generateValue: true  # 쿠키 서명용 자동 생성
      - key: MENTOR_MODEL
        value: claude-haiku-4-5
      - key: PYTHON_VERSION
        value: "3.11"
